<section class="glass-card">
  <h1 class="section-title">Избранные товары</h1>
</section>

<section class="section-block">
  @if (!favorites.products().length) {
    <div class="empty-state favorites-empty">
      <h2>Пока пусто</h2>
      <p class="muted">Добавьте товары с главной страницы в избранное.</p>
      <a class="primary-button" routerLink="/products">На главную</a>
    </div>
  } @else {
    <div class="product-grid">
      @for (product of favorites.products(); track product.id) {
        <app-product-card [product]="product" mode="favorites" />
      }
    </div>
  }
</section>
