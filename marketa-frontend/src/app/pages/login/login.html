<div class="login-box">
  <h2>Marketa</h2>

  @if (errorMessage) {
    <div class="error-badge">{{ errorMessage }}</div>
  }

  <div class="form-group">
    <label>Name:</label>
    <input type="text" [(ngModel)]="loginData.username" placeholder="Введите логин">
  </div>

  <div class="form-group">
    <label>Password:</label>
    <input type="password" [(ngModel)]="loginData.password" placeholder="Введите пароль">
  </div>

  <button (click)="onLogin()">Sing in</button>
  
  <p><a routerLink="/register">Sing up</a></p>
</div>
