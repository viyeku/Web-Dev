<div class="auth-shell">
  <section class="auth-card">
    <div class="auth-header">
      <h1>Войдите в Marketa.</h1>
    </div>

    <div class="auth-grid section-block">
      <label>
        <span class="field-label">Логин</span>
        <input class="field-input" type="text" [(ngModel)]="loginData.username" placeholder="Введите логин" />
      </label>

      <label>
        <span class="field-label">Пароль</span>
        <input class="field-input" type="password" [(ngModel)]="loginData.password" placeholder="Введите пароль" />
      </label>
    </div>

    <div class="inline-actions section-block">
      <button class="primary-button" type="button" (click)="onLogin()">Войти</button>
      <a class="ghost-button" routerLink="/register">Регистрация</a>
    </div>
  </section>
</div>
