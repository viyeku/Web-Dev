<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
</head>
<link rel="stylesheet" href="./app.css">
<body>

<div class="page-container">
  <nav class="navbar">
    <div class="nav-left">
      <h1 class="logo">MARKETA.</h1>
      <div class="nav-links">
        <a href="#" class="nav-link">Каталог</a>
        <a href="#" class="nav-link">Заказы</a>
      </div>
    </div>

    <div class="nav-right">
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" placeholder="Поиск девайсов..." class="search-input">
      </div>
      
      <button class="cart-button">
        🛒
        <span class="cart-badge">3</span>
      </button>
    </div>
  </nav>

  <div class="content-wrapper">
    <aside class="sidebar">
      <h3 class="sidebar-title">Категории</h3>
      <ul class="category-list">
        <li><button class="category-btn active">Все товары</button></li>
        <li><button class="category-btn">Smartphones</button></li>
        <li><button class="category-btn">PC & Laptops</button></li>
        <li><button class="category-btn">Watches</button></li>
      </ul>
    </aside>

    <main class="main-content">
      <div class="page-header">
        <h2 class="section-title">Все смартфоны и гаджеты</h2>
        <p class="results-count">Найдено 12 позиций</p>
      </div>

      <div class="product-grid">
        <div class="product-card">
          <div class="product-image-box">
            <span class="emoji-icon">📱</span>
          </div>
          
          <div class="product-info">
            <span class="product-category">Smartphones</span>
            <h3 class="product-name">iPhone 15 Pro</h3>
            <p class="product-owner">Продавец: Apple Store</p>
          </div>

          <div class="product-footer">
            <span class="product-price">550 000 ₸</span>
            <button class="add-to-cart-btn">В корзину</button>
          </div>
        </div>
        </div>
    </main>
  </div>
</div>
</body>
</html>
