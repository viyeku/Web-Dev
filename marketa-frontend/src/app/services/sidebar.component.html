<aside class="w-64 bg-white border-r border-gray-200 p-6">
  <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">
    Категории
  </h3>
  
  <ul class="space-y-2">
    <li>
      <button 
        (click)="selectCategory()" 
        class="w-full text-left px-3 py-2 rounded-lg hover:bg-blue-50 hover:text-blue-700 transition text-sm">
        Все товары
      </button>
    </li>

    @for (cat of categoryService.categories(); track cat.id) {
      <li>
        <button 
          (click)="selectCategory(cat.id)" 
          class="w-full text-left px-3 py-2 rounded-lg hover:bg-blue-50 hover:text-blue-700 transition text-sm text-gray-600">
          {{ cat.name }}
        </button>
      </li>
    }
  </ul>
</aside>
